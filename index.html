<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap');
:root{--bg:#f0f2f5;--cd:#fff;--tx:#0f172a;--mu:#64748b;--bd:#e2e8f0;--pr:#2563eb;--pl:#dbeafe;--ok:#16a34a;--ol:#dcfce7;--dn:#dc2626;--dl:#fee2e2;--wn:#d97706;--wl:#fef3c7;--pu:#7c3aed;--pul:#f3e8ff;--cy:#0891b2;--cyl:#cffafe;--pk:#9d174d;--pkl:#fce7f3;--in:#3730a3;--inl:#e0e7ff;--tl:#0f766e;--tll:#ccfbf1}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:11px}

.hs{padding:3px 5px;border-radius:4px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:9px;font-weight:600;cursor:pointer;outline:none}.hs option{color:#000}
.hb2{padding:3px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:9px;font-weight:700;cursor:pointer}
.nv{display:flex;gap:2px;background:var(--cd);border-bottom:1px solid var(--bd);padding:2px 12px;flex-wrap:wrap}
.nb{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:700;background:transparent;color:var(--mu)}.nb:hover{background:var(--bg)}.nb.a{background:var(--pr);color:#fff}
.ct{padding:5px 12px 20px}
.ru{background:var(--wl);border:1px solid #fbbf24;border-radius:5px;padding:4px 8px;margin-bottom:5px;font-size:7px;color:#78350f;display:flex;gap:3px;flex-wrap:wrap;font-weight:600}
.crd{background:var(--cd);border-radius:5px;border:1px solid var(--bd);overflow:hidden}
.sr{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.sc{flex:1 1 80px;min-width:75px;background:var(--cd);border-radius:5px;border:1px solid var(--bd);padding:4px 5px;display:flex;align-items:center;gap:5px}
.si{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.sl{font-size:6px;color:var(--mu);font-weight:600}.sv2{font-size:12px;font-weight:800;line-height:1}
.vc{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;align-items:center}
.pg{display:flex;gap:1px;background:var(--bg);border-radius:3px;padding:1px}
.pl{padding:3px 7px;border-radius:3px;border:none;cursor:pointer;font-size:8px;font-weight:700;background:transparent;color:var(--mu)}.pl.a{background:var(--pr);color:#fff}
.fs{padding:2px 4px;border:1px solid var(--bd);border-radius:3px;font-size:9px;background:var(--cd);cursor:pointer;outline:none;font-weight:600}
.di{padding:2px 4px;border:1px solid var(--bd);border-radius:3px;font-size:9px;background:var(--cd);outline:none}
.lbl{font-size:7px;font-weight:700;color:var(--mu)}

table{width:max-content;border-collapse:separate;border-spacing:0;font-size:8px}
th,td{padding:3px 2px;text-align:center;vertical-align:middle;white-space:nowrap;border-bottom:1px solid #f1f5f9;border-right:1px solid #f8fafc}
th{background:#f1f5f9;font-weight:700;color:#334155;position:sticky;top:0;z-index:20}
tr:nth-child(even) td{background:#fafcfe}
/* Sticky left columns: #(0), Store(1), Name(2), Pos(3) */
.fix{position:sticky;z-index:15;background:var(--cd)}

th.fix{z-index:30;background:#e8ecf1}
.f0{left:0;min-width:22px;width:22px}.f1{left:22px;min-width:42px;width:42px}.f2{left:64px;min-width:95px;width:95px}.f3{left:159px;min-width:55px;width:55px}

.f3::after{content:'';position:absolute;top:0;bottom:0;width:2px;background:var(--bd)}
[dir=ltr] .f3::after{right:-1px}[dir=rtl] .f3::after{left:-1px}
.dh{border-inline-start:1px solid #cbd5e1}
.dfr{background:#fffbeb !important}

.ti{width:54px;padding:1px 1px;border:1px solid var(--bd);border-radius:3px;font-size:8px;text-align:center;outline:none;background:var(--cd)}.ti:focus{border-color:var(--pr)}
.hb3{display:inline-block;padding:0 2px;border-radius:2px;font-size:7px;font-weight:800}
.h1{background:#dcfce7;color:#166534}.h2{background:#fef3c7;color:#92400e}.h3{background:#fee2e2;color:#991b1b}
.cb2{display:inline-flex;align-items:center;font-size:5px;cursor:pointer;color:var(--mu)}.cb2 input{width:7px;height:7px;cursor:pointer;accent-color:var(--pr)}
.bt{padding:3px 8px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:700}.bt:active{transform:scale(.97)}

.ftr td{background:#eef2f7!important;font-weight:700;border-top:2px solid var(--bd);font-size:7px}
.ftr .fix{background:#eef2f7!important}
.ftr-lbl{font-weight:800;text-align:right!important;padding-inline-end:4px!important}
html[dir=rtl] .ftr-lbl{text-align:left!important}
.sales-input{width:60px;padding:1px 2px;border:1px solid #93c5fd;border-radius:3px;font-size:7px;text-align:center;outline:none;background:#eff6ff;font-weight:700;color:var(--pr)}
/* Settings */
.sett{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:6px;margin-bottom:6px}
.sett-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:3px}
.sett-row{display:flex;align-items:center;gap:3px;padding:3px 4px;background:#f8fafc;border-radius:4px;font-size:8px}
.sett-row .nm{font-weight:700;min-width:75px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sett-row input[type=time]{padding:1px 2px;border:1px solid var(--bd);border-radius:3px;font-size:8px;outline:none;width:58px}
.app-btn{padding:2px 6px;border-radius:3px;border:1px solid var(--ok);background:var(--ol);color:var(--ok);cursor:pointer;font-size:7px;font-weight:800}
.app-btn:hover{background:var(--ok);color:#fff}
/* Employee page */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:7px}
.ec{background:var(--cd);border-radius:7px;border:1px solid var(--bd);padding:8px}
.ef{margin-top:5px;padding:5px;background:var(--wl);border-radius:4px;border:1px solid #fcd34d}
.efg{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.fg{display:flex;flex-direction:column;gap:1px}.fg label{font-size:7px;font-weight:700;color:var(--mu)}
.fg input,.fg select{padding:3px 4px;border:1px solid var(--bd);border-radius:3px;font-size:10px;outline:none;background:var(--cd)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:8px}
.mdl{background:var(--cd);border-radius:8px;padding:14px;width:100%;max-width:400px}.mdl h3{margin-bottom:8px;font-size:12px;font-weight:800}
.toast{position:fixed;bottom:8px;right:8px;background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:9px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:9999;transform:translateY(80px);opacity:0;transition:.2s;max-width:240px}
html[dir=rtl] .toast{right:auto;left:8px}
.toast.show{transform:translateY(0);opacity:1}.toast.tw{border-color:#fbbf24;background:#fffbeb;color:#92400e}.toast.te{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.toast.ts{border-color:#86efac;background:#f0fdf4;color:#166534}
/* Print */
#printWrap{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .hd,.nv,.vc,.ru,.wa,.sr,.np,.copy-btn,.cb2,.sett,.toast,#app{display:none!important}
  #printWrap{display:block!important;position:absolute;top:0;left:0;width:100%;overflow:visible}
  html,body{height:auto!important;overflow:visible!important;background:#fff!important;margin:0!important;padding:0!important}
  .print-title{text-align:center;font-size:9pt;font-weight:800;margin-bottom:3px}
  #printContent table{border-collapse:collapse!important}
  #printContent th,#printContent td{position:static!important;border:1px solid #bbb!important}
  @page{size:A4 landscape;margin:4mm}
}
@media(max-width:768px){.eg{grid-template-columns:1fr}}
</style>
</head>

const L={en:{

},ar:{
title:"نظام جدولة الموظفين",sub:"الجداول والتكاليف",sched:"📅 الجدول",emps:"👥 الموظفين",summ:"📊 الملخص",

rl:"القواعد: ",r1:"4/شهر",r2:"1/أسبوع",r3:"عمل الراحة=1.5×",r4:"راحة=9س",r5:"إجازة=بدون",r6:"12س/يوم",r7:"120س/شهر",r8:"إجازة سنوية ومرضية=9س مدفوعة",

a4:"⚠ تجاوز 4",a1:"⚠ تجاوز 1/أسبوع",a12:"⚠ >12س!",a120:"⚠ >120س!",cd:"حذف؟",fr:"أدخل البيانات",dp:"موجود",lang:"EN",week:"أسبوع"
}};

let G={lg:"en",yr:new Date().getFullYear(),mo:new Date().getMonth(),pg:"schedule",vw:"weekly",wkF:"",wkT:"",selD:1,fSt:"all",edE:null,shA:false,showSett:false,
es:[
{id:"27761",n:"Ali Mahfouz",s:"H_308",p:"Store Manager",sh:"Morning",d:"Sat",sa:8000,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"25984",n:"Abdul Malik",s:"H_308",p:"Shift Manager",sh:"Morning",d:"Wed",sa:6000,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"17220",n:"Mohammed Sarwat",s:"H_308",p:"Crew Trainer",sh:"Morning",d:"Sun",sa:5000,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"28646",n:"Nouf Saleh Fakhriji",s:"H_308",p:"Saudi Cashier",sh:"Morning",d:"Sat",sa:5500,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"29302",n:"Faizal Khan",s:"H_198",p:"Shift Manager",sh:"Evening",d:"Sun",sa:6000,dIn:"15:00",dOut:"00:00",dCr:true},
{id:"25783",n:"Marvin Lucas",s:"H_198",p:"Second Assistant",sh:"Morning",d:"Tue",sa:5500,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"23980",n:"Narian Sunuuar",s:"H_308",p:"Service Crew",sh:"Evening",d:"Tue",sa:4000,dIn:"15:00",dOut:"00:00",dCr:true},
{id:"29325",n:"Muzammil Siddique",s:"H_308",p:"Shift Manager",sh:"Morning",d:"Sun",sa:6000,dIn:"07:00",dOut:"16:00",dCr:false},
{id:"23689",n:"Rahat Mahmud Rafi",s:"H_308",p:"Shift Manager",sh:"Evening",d:"Mon",sa:6000,dIn:"15:00",dOut:"00:00",dCr:true},
{id:"1111",n:"Alam Shek",s:"H_308",p:"Service Crew",sh:"Morning",d:"Sun",sa:4000,dIn:"07:00",dOut:"16:00",dCr:false},
],sc:{},sales:{},ne:{id:"",n:"",s:"H_308",p:"Service Crew",sh:"Morning",d:"Fri",sa:4000,dIn:"07:00",dOut:"16:00",dCr:false}};

const t=k=>L[G.lg][k]||k;const dim=()=>new Date(G.yr,G.mo+1,0).getDate();
const fd=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const dw=(y,m,d)=>new Date(y,m,d).getDay();const dn=(y,m,d)=>DE[dw(y,m,d)];
const sk=(e,d)=>`${e}_${d}`;const hasOT=p=>!NO_OT.includes(p);
function cH(a,b,cr){if(!a||!b)return 0;const[h1,m1]=a.split(":").map(Number),[h2,m2]=b.split(":").map(Number);let x=(h2*60+m2)-(h1*60+m1);if(cr||x<0)x+=1440;return Math.round(x/60*100)/100;}
// Paid leave statuses (9h base, not OT)
const PAID9=["OFF","AnnualLeave","SickLeave"];
function isPaid9(s){return PAID9.includes(s);}
function dE(emp,ds){const p=ds.split('-').map(Number),dd=dn(p[0],p[1]-1,p[2]);if(dd===emp.d)return{s:"OFF",a:"",b:"",c:false,a2:"",b2:"",c2:false,h:9,ot:false};return{s:"work",a:emp.dIn,b:emp.dOut,c:!!emp.dCr,a2:"",b2:"",c2:false,h:cH(emp.dIn,emp.dOut,!!emp.dCr),ot:false};}
function iS(){const d=dim();G.es.forEach(e=>{for(let i=1;i<=d;i++){const ds=fd(G.yr,G.mo,i),k=sk(e.id,ds);if(!G.sc[k])G.sc[k]=dE(e,ds);}});}
function iW(){if(!G.wkF||!G.wkT||new Date(G.wkF).getMonth()!==G.mo){G.wkF=fd(G.yr,G.mo,1);G.wkT=fd(G.yr,G.mo,Math.min(7,dim()));}}
function vDays(){const d=dim(),all=Array.from({length:d},(_,i)=>i+1);if(G.vw==="dy")return[G.selD];if(G.vw==="wk"){iW();const f=new Date(G.wkF),t2=new Date(G.wkT);return all.filter(i=>{const dt=new Date(G.yr,G.mo,i);return dt>=f&&dt<=t2;});}return all;}
function fE(){return G.fSt==="all"?G.es:G.es.filter(e=>e.s===G.fSt);}

function dayS(dd,emps){const ds=fd(G.yr,G.mo,dd);let rH=0,oH=0,rC=0,oC=0;
emps.forEach(emp=>{const e=G.sc[sk(emp.id,ds)];if(!e)return;const hr=emp.sa/(30*9),can=hasOT(emp.p);
if(e.s==="work"||e.s==="Broken"){if(e.ot&&can){oH+=e.h||0;oC+=(e.h||0)*hr*1.5;}else{rH+=e.h||0;rC+=(e.h||0)*hr;}}
if(isPaid9(e.s)){rH+=9;rC+=9*hr;}});
const s=G.sales[ds]||0,tc=Math.round(rC+oC),lp=s>0?((tc/s)*100).toFixed(1):'—';
return{rH:Math.round(rH*10)/10,oH:Math.round(oH*10)/10,rC:Math.round(rC),oC:Math.round(oC),tc,s,lp};}

function eSt(eid,days){const emp=G.es.find(e=>e.id===eid);const can=emp?hasOT(emp.p):true;
let tH=0,plD=0,ulD=0,wD=0,otH=0,rH=0,alD=0,skD=0;
days.forEach(i=>{const ds=fd(G.yr,G.mo,i),e=G.sc[sk(eid,ds)];if(!e)return;
if(e.s==="work"||e.s==="Broken"){wD++;const h=e.h||0;tH+=h;if(e.ot&&can)otH+=h;else rH+=h;}
if(e.s==="OFF"){plD++;tH+=9;rH+=9;}

if(e.s==="SickLeave"){skD++;tH+=9;rH+=9;}
if(e.s==="Vacation")ulD++;});
return{tH,plD,ulD,wD,otH,rH,alD,skD};}
function eMS(eid){return eSt(eid,Array.from({length:dim()},(_,i)=>i+1));}
function lC(emp){const st=eMS(emp.id);const hr=emp.sa/(30*9);return{tot:Math.round(st.rH*hr+(hasOT(emp.p)?st.otH*hr*1.5:0))};}

function uE(eid,ds,f,v){
const k=sk(eid,ds),e={...(G.sc[k]||{})},emp=G.es.find(x=>x.id===eid);
const d=dim(),p=ds.split('-').map(Number),dd=dn(p[0],p[1]-1,p[2]),can=emp?hasOT(emp.p):true;
if(f==="s"){
  const offTypes=["OFF","Vacation","AnnualLeave","SickLeave"];
  if(offTypes.includes(v)){
    let mO=0;for(let i=1;i<=d;i++){const k2=sk(eid,fd(G.yr,G.mo,i));if(k2!==k&&offTypes.includes(G.sc[k2]?.s))mO++;}
    if(mO>=4){sT(t('a4'),'w');return;}
    const dt=new Date(p[0],p[1]-1,p[2]),ws=new Date(dt);ws.setDate(ws.getDate()-ws.getDay());const we=new Date(ws);we.setDate(we.getDate()+6);
    let wO=0;for(let i=1;i<=d;i++){const dt2=new Date(G.yr,G.mo,i);if(dt2>=ws&&dt2<=we){const k2=sk(eid,fd(G.yr,G.mo,i));if(k2!==k&&offTypes.includes(G.sc[k2]?.s))wO++;}}
    if(wO>=1){sT(t('a1'),'w');return;}
    e.s=v;e.a="";e.b="";e.c=false;e.a2="";e.b2="";e.c2=false;
    e.h=isPaid9(v)?9:0;e.ot=false;
  }else if(v==="work"){e.s="work";e.ot=dd===emp?.d&&can;e.a=emp.dIn;e.b=emp.dOut;e.c=!!emp.dCr;e.a2="";e.b2="";e.c2=false;e.h=cH(emp.dIn,emp.dOut,!!emp.dCr);
  }else if(v==="Broken"){e.s="Broken";e.ot=dd===emp?.d&&can;e.a="07:00";e.b="11:00";e.c=false;e.a2="16:00";e.b2="21:00";e.c2=false;e.h=9;
  }else{e.s="Transfer";e.a="";e.b="";e.c=false;e.a2="";e.b2="";e.c2=false;e.h=0;e.ot=false;}
}else{e[f]=v;e.h=Math.round((cH(e.a,e.b,e.c)+(e.s==="Broken"?cH(e.a2,e.b2,e.c2):0))*100)/100;e.ot=dd===emp?.d&&can;}
G.sc[k]=e;if(e.s==="work"&&e.h>12)sT(t('a12'),'e');render();}

function setSales(ds,v){G.sales[ds]=parseFloat(v)||0;render();}
function copyFwd(eid){const vd=vDays(),d=dim();if(!vd.length)return;const pat=vd.map(dd=>({...G.sc[sk(eid,fd(G.yr,G.mo,dd))]}));const last=Math.max(...vd);let pi=0;for(let i=last+1;i<=d;i++){G.sc[sk(eid,fd(G.yr,G.mo,i))]={...pat[pi%pat.length]};pi++;}sT(t('copied'),'s');render();}
function applyDef(eid){const emp=G.es.find(e=>e.id===eid);if(!emp)return;const today=new Date(),can=hasOT(emp.p);
for(let i=1;i<=dim();i++){const dt=new Date(G.yr,G.mo,i);if(G.yr===today.getFullYear()&&G.mo===today.getMonth()&&dt<new Date(today.getFullYear(),today.getMonth(),today.getDate()))continue;
const ds=fd(G.yr,G.mo,i),e=G.sc[sk(eid,ds)];if(!e||e.s!=="work")continue;e.a=emp.dIn;e.b=emp.dOut;e.c=!!emp.dCr;e.h=cH(emp.dIn,emp.dOut,!!emp.dCr);e.ot=dn(G.yr,G.mo,i)===emp.d&&can;}
sT(t('applied'),'s');render();}
function setDefTime(eid,f,v){G.es=G.es.map(e=>e.id===eid?{...e,[f]:v}:e);render();}

let tTm;function sT(m,tp){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(tp==='w'?' tw':'')+(tp==='e'?' te':'')+(tp==='s'?' ts':'');clearTimeout(tTm);tTm=setTimeout(()=>el.classList.remove('show'),2500);}
function sC(s){return s==="work"?"sw":s==="OFF"?"so":s==="Vacation"?"sv3":s==="Broken"?"sb2":s==="Transfer"?"st2":s==="AnnualLeave"?"sal":"ssk";}
function sL(s){return s==="work"?t('wk2'):s==="OFF"?t('of'):s==="Vacation"?t('vc'):s==="Broken"?t('bk'):s==="Transfer"?t('tf'):s==="AnnualLeave"?t('al'):t('sk');}
function hB(h,s){if(isPaid9(s))return`<span class="hb3" style="background:${s==='AnnualLeave'?'var(--tll)':'#fae8ff'};color:${s==='AnnualLeave'?'var(--tl)':'#86198f'}">9h</span>`;if(s==="Vacation")return'<span class="hb3" style="background:var(--inl);color:var(--in)">0</span>';if(s!=="work"&&s!=="Broken")return'-';return`<span class="hb3 ${h>12?'h3':h>9?'h2':'h1'}">${h.toFixed(1)}</span>`;}
function n$(v){return v.toLocaleString();}

  const d=dim(),vd=vDays(),es=fE();

  h+=`</tbody></table>`;
  return h;
}

    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:5px"><h3 style="font-size:11px;font-weight:800">${t('smT')}</h3><button class="bt bk np" onclick="doPrint()">${t('pr')}</button></div>`;
    h+=`<div class="crd" style="overflow:auto"><table><thead><tr><th>#</th><th>${t('nm')}</th><th>${t('en2')}</th><th>${t('ps')}</th><th>${t('wD')}</th><th>${t('pL')}</th><th>${t('al')}</th><th>${t('sk')}</th><th>${t('uL')}</th><th>${t('tH')}</th><th>${t('oH')}</th><th>${t('bS')}</th><th>${t('tot')}</th></tr></thead><tbody>`;
    aE.forEach((emp,idx)=>{const ms=eMS(emp.id),cost=lC(emp);h+=`<tr><td>${idx+1}</td><td style="font-weight:600;text-align:${G.lg==='ar'?'right':'left'};font-size:8px">${emp.n}</td><td style="font-size:7px;color:var(--mu)">${emp.id}</td><td><span class="bg b4" style="font-size:5px">${emp.p}</span></td><td style="color:var(--ok);font-weight:700">${ms.wD}</td><td style="color:var(--pk)">${ms.plD}</td><td style="color:var(--tl)">${ms.alD}</td><td style="color:#86198f">${ms.skD}</td><td style="color:var(--in)">${ms.ulD}</td><td style="color:var(--pr);font-weight:800">${ms.tH.toFixed(1)}</td><td style="color:var(--wn)">${hasOT(emp.p)?ms.otH.toFixed(1):'—'}</td><td>${n$(emp.sa)}</td><td style="color:var(--pr);font-weight:800">${n$(cost.tot)}</td></tr>`;});
    h+=`<tr class="ftr"><td colspan="4">${t('tot')}</td><td style="color:var(--ok)">${aMS.wD}</td><td style="color:var(--pk)">${aMS.plD}</td><td style="color:var(--tl)">${aMS.alD}</td><td style="color:#86198f">${aMS.skD}</td><td style="color:var(--in)">${aMS.ulD}</td><td style="color:var(--pr)">${aMS.tH.toFixed(1)}</td><td style="color:var(--wn)">${aMS.otH.toFixed(1)}</td><td>${n$(aE.reduce((s,e)=>s+e.sa,0))}</td><td style="color:var(--pr);font-size:10px">${n$(totL2)}</td></tr></tbody></table></div>`;
  }

  h+=`</div>`;
  if(G.shA){const ne=G.ne;h+=`<div class="mbg" onclick="if(event.target===this)ss('shA',false)"><div class="mdl"><h3>${t('addN')}</h3><div class="efg" style="gap:4px">
    <div class="fg"><label>${t('en2')}</label><input id="ni" value="${ne.id}"></div><div class="fg"><label>${t('nm')}</label><input id="nn" value="${ne.n}"></div>
    <div class="fg"><label>${t('st')}</label><select id="ns">${STO.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
    <div class="fg"><label>${t('ps')}</label><select id="np">${POS.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div>
    <div class="fg"><label>${t('do2')}</label><select id="nd">${DE.map((dd,i)=>`<option value="${dd}"${dd===ne.d?' selected':''}>${L[G.lg].days[i]}</option>`).join('')}</select></div>
    <div class="fg"><label>${t('bS')}</label><input type="number" id="nl" value="${ne.sa}"></div>
    <div class="fg"><label>Default In</label><input type="time" id="ndi" value="${ne.dIn}"></div>
    <div class="fg"><label>Default Out</label><input type="time" id="ndo" value="${ne.dOut}"></div>
  </div><div style="display:flex;gap:3px;margin-top:6px"><button class="bt bs" onclick="addEm()">${t('sv')}</button><button class="bt bo" onclick="ss('shA',false)">${t('cn')}</button></div></div></div>`;}
  document.getElementById('app').innerHTML=h;
}

// Print with auto-scale
function doPrint(){
  const title=`${t('title')} — ${L[G.lg].mons[G.mo]} ${G.yr}${G.vw==='wk'?' ('+G.wkF+' → '+G.wkT+')':''}`;
  document.getElementById('printTitle').textContent=title;
  const pc=document.getElementById('printContent');
  pc.innerHTML=buildTable(true);
  pc.style.transform='none';pc.style.width='auto';
  requestAnimationFrame(()=>{
    const cW=pc.scrollWidth,cH2=pc.scrollHeight;
    // A4 landscape: ~287mm×190mm usable → ~1085×718px at 96dpi
    const pW=1085,pH=710;
    const sX=cW>pW?pW/cW:1,sY=cH2>pH?pH/cH2:1;
    const sc=Math.min(sX,sY,1);
    pc.style.transform=`scale(${sc})`;
    pc.style.transformOrigin=document.documentElement.dir==='rtl'?'top right':'top left';
    if(sc<1)pc.style.width=(100/sc)+'%';
    window.print();
    setTimeout(()=>{pc.style.transform='none';pc.style.width='auto';},500);
  });
}

function ss(k,v){G[k]=v;if(k==='yr'||k==='mo'){G.sc={};G.sales={};G.wkF='';G.wkT='';}render();}
function tL(){G.lg=G.lg==='en'?'ar':'en';document.documentElement.lang=G.lg==='ar'?'ar':'en';document.documentElement.dir=G.lg==='ar'?'rtl':'ltr';render();}
function edEm(id,f,v){G.es=G.es.map(e=>e.id===id?{...e,[f]:v}:e);if(f==='d'||f==='sh'){for(let i=1;i<=dim();i++)delete G.sc[sk(id,fd(G.yr,G.mo,i))];}render();}
function dEl(id){if(confirm(t('cd'))){G.es=G.es.filter(e=>e.id!==id);render();}}
function addEm(){const id=document.getElementById('ni').value.trim(),n=document.getElementById('nn').value.trim();if(!id||!n){sT(t('fr'),'w');return;}if(G.es.find(e=>e.id===id)){sT(t('dp'),'w');return;}G.es.push({id,n,s:document.getElementById('ns').value,p:document.getElementById('np').value,sh:"Morning",d:document.getElementById('nd').value,sa:+document.getElementById('nl').value||4000,dIn:document.getElementById('ndi').value||"07:00",dOut:document.getElementById('ndo').value||"16:00",dCr:false});G.shA=false;render();}
window.uE=uE;window.ss=ss;window.tL=tL;window.edEm=edEm;window.dEl=dEl;window.addEm=addEm;window.copyFwd=copyFwd;window.applyDef=applyDef;window.setDefTime=setDefTime;window.setSales=setSales;window.doPrint=doPrint;
render();
</script>
